<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Himanshu</title>

<!-- ✅ Google Analytics (UNCHANGED) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NWWMV87WVS"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NWWMV87WVS');
</script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;

    background: linear-gradient(-45deg, #ff6a00, #ee0979, #00c6ff, #0072ff);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.chat {
    width: 360px;
    height: 620px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    overflow: hidden;
}

.header {
    padding: 15px;
    text-align: center;
    color: white;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
}

.progress {
    height: 5px;
    background: #ffffff30;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff9d;
    transition: width 0.4s;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    max-width: 70%;
    padding: 10px;
    margin: 8px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.4s forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.sent {
    align-self: flex-start;
    background: rgba(255,255,255,0.85);
}

.received {
    align-self: flex-end;
    background: #00ff9d;
}

.img-msg {
    text-align: center;
    margin-top: 10px;
}

img {
    width: 180px;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.2s;
}

img:hover {
    transform: scale(1.05);
}

.instruction {
    font-size: 12px;
    color: white;
    margin-top: 5px;
}

#choices {
    display: none;
    padding: 10px;
    text-align: center;
}

#choices button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

#choices button:hover {
    transform: scale(1.1);
}

#choices button:nth-child(1) { background: #00ff9d; }
#choices button:nth-child(2) { background: #ddd; }
#choices button:nth-child(3) { background: #ff4d4d; color: white; }

</style>
</head>

<body>

<div class="chat">
    <div class="header">Himanshu</div>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="messages" id="messages">

        <div class="img-msg" id="imageContainer">
            <img id="img" src="1.png" />
            <div class="instruction">Tap the image</div>
        </div>

        <div id="choices">
            <button onclick="choose('forgive')">❤️ Forgive</button>
            <button onclick="choose('ignore')">😑 Ignore</button>
            <button onclick="choose('roast')">🔥 Roast</button>
        </div>

    </div>
</div>

<!-- 🎵 Music (UNCHANGED) -->
<audio id="bgMusic" src="Music.mp3" loop></audio>

<script>
let step = 0;
let progress = 0;
let mode = "story";
let musicStarted = false;

const progressBar = document.getElementById("progressBar");
const chat = document.getElementById("messages");
const img = document.getElementById("img");
const music = document.getElementById("bgMusic");

music.volume = 0.3;

const storyMessages = [
    "You tapped… 😏",
    "Trying to fix things?",
    "Not so easy...",
    "Do you really mean sorry?",
    "Hmm… thinking 🤔"
];

// 🎯 Typing effect
function typingMessage(text, type="sent") {
    let div = document.createElement("div");
    div.className = "msg " + type;

    chat.insertBefore(div, document.getElementById("imageContainer"));

    let i = 0;
    let interval = setInterval(() => {
        div.innerText += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 25);

    chat.scrollTop = chat.scrollHeight;
}

// 📊 Progress
function updateProgress() {
    progress += 20;
    progressBar.style.width = progress + "%";
}

// 👆 Tap event
img.addEventListener("click", () => {

    if (!musicStarted) {
        music.play();
        musicStarted = true;
    }

    if (mode !== "story") return;

    updateProgress();

    if (step < storyMessages.length) {
        typingMessage(storyMessages[step], "sent");

        setTimeout(() => {
            typingMessage("...", "received");
        }, 400);
    }

    step++;

    if (step === storyMessages.length) {
        document.getElementById("choices").style.display = "block";
        mode = "choice";

        // Track choice screen
        gtag('event', 'choice_shown', {
            event_category: 'interaction'
        });
    }
});

// 🎮 Choices
function choose(option) {

    document.getElementById("choices").style.display = "none";
    mode = "end";

    gtag('event', 'ending_selected', {
        event_category: 'interaction',
        event_label: option
    });

    if (option === "forgive") {
        typingMessage("Okay… I forgive you 🙂", "received");
        typingMessage("Don’t mess up again 😌", "received");
        startHearts();
    }

    else if (option === "ignore") {
        typingMessage("Seen ✔✔", "received");
        setTimeout(() => {
            typingMessage("No reply.", "received");
        }, 800);
    }

    else if (option === "roast") {
        typingMessage("Wow 😂", "received");
        typingMessage("You thought sorry is enough?", "received");
        typingMessage("Try again next life 😈", "received");
        shakeScreen();
    }
}

// ❤️ Hearts
function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.style.position = "absolute";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = window.innerHeight + "px";

        document.body.appendChild(heart);

        heart.animate([
            { transform: "translateY(0)", opacity: 1 },
            { transform: "translateY(-200px)", opacity: 0 }
        ], { duration: 2000 });

        setTimeout(() => heart.remove(), 2000);
    }, 300);
}

// 😈 Shake
function shakeScreen() {
    document.body.animate([
        { transform: "translateX(-10px)" },
        { transform: "translateX(10px)" },
        { transform: "translateX(-10px)" },
        { transform: "translateX(0)" }
    ], {
        duration: 400,
        iterations: 2
    });
}
</script>

</body>
</html>
