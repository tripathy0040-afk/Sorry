<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Himanshu</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to bottom, #ece5dd, #dcdcdc);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat {
    width: 360px;
    height: 640px;
    background: #fff;
    display: flex;
    flex-direction: column;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

.header {
    background: #075e54;
    color: white;
    padding: 16px;
    font-weight: 600;
    font-size: 16px;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    max-width: 75%;
    padding: 10px 12px;
    margin: 6px 0;
    border-radius: 12px;
    font-size: 14px;
}

.sent {
    background: #f1f0f0;
    align-self: flex-start;
}

.received {
    background: #dcf8c6;
    align-self: flex-end;
}

.img-msg {
    align-self: center;
    text-align: center;
    margin-top: 10px;
}

img {
    width: 280px;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.25s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

img:active {
    transform: scale(0.95);
}

.instruction {
    font-size: 12px;
    color: #666;
    margin-top: 8px;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }
}

.shake {
    animation: shake 0.3s;
}

.heart {
    position: absolute;
    font-size: 24px;
    color: #ff4d4d;
    animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<div class="chat">
    <div class="header">Himanshu</div>

    <div class="messages" id="messages">

        <div class="img-msg" id="imageContainer">
            <img id="img" src="1.png" />
            <div class="instruction" id="instruction">Double tap the image</div>
        </div>

    </div>
</div>

<audio id="bgMusic" src="Pretty%20Woman.mp3" loop></audio>

<script>
let lastTap = 0;
let step = -1;
let finalMode = false;
let musicStarted = false;

const messages = [
    "I think there was a misunderstanding.",
    "I didn’t mean for things to go that way.",
    "Our friendship matters.",
    "Sorry about that."
];

const imageList = [
    "1.png","2.png","3.png","4.png",
    "5.png","6.png","7.png","8.png"
];

let imageIndex = 0;

const img = document.getElementById("img");
const chat = document.getElementById("messages");
const music = document.getElementById("bgMusic");

music.volume = 0.3;

// Add message
function addMessage(text, type = "sent") {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.insertBefore(div, document.getElementById("imageContainer"));
    chat.scrollTop = chat.scrollHeight;
}

// ❤️ Continuous heart flow
function startHeartFlow() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = window.innerHeight + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 2000);
    }, 300);
}

// Click logic
img.addEventListener("click", (e) => {

    if (!musicStarted) {
        music.play();
        musicStarted = true;
    }

    let currentTime = new Date().getTime();
    let tapLength = currentTime - lastTap;

    img.classList.add("shake");
    setTimeout(() => img.classList.remove("shake"), 300);

    // ✅ DOUBLE TAP ONLY
    if (tapLength < 300 && tapLength > 0) {

        // Change image only on double tap
        imageIndex = (imageIndex + 1) % imageList.length;
        img.src = imageList[imageIndex];

        if (finalMode) return;

        step++;

        if (step === 0) {
            addMessage("Hi Pretty...", "sent");

            setTimeout(() => {
                addMessage("?? 😠", "received");
            }, 1000);
        }
        else if (step <= messages.length) {
            addMessage(messages[step - 1], "sent");
        }
        else if (step === messages.length + 1) {
            addMessage("Sorry granted 🙂", "received");

            finalMode = true;
            document.getElementById("instruction").innerText = "Enjoy 😊";

            // ❤️ Start heart flow
            startHeartFlow();
        }
    }

    lastTap = currentTime;
});
</script>

</body>
</html>
