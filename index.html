<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Aurobinda</title>

<style>
body {
    margin: 0;
    background: #ece5dd;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat {
    width: 350px;
    height: 600px;
    background: #fff;
    display: flex;
    flex-direction: column;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.header {
    background: #075e54;
    color: white;
    padding: 15px;
    font-weight: bold;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    max-width: 70%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    font-size: 15px;
}

.sent {
    background: #f1f0f0;
    align-self: flex-start;
}

.received {
    background: #dcf8c6;
    align-self: flex-end;
}

.img-msg {
    align-self: center;
    text-align: center;
}

svg {
    width: 120px;
    cursor: pointer;
}

.instruction {
    font-size: 13px;
    color: #777;
    margin-top: 5px;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }
}

.shake {
    animation: shake 0.3s;
}

.heart {
    position: absolute;
    font-size: 20px;
    color: #ff4d4d;
    animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-150px); opacity: 0; }
}
</style>
</head>

<body>

<div class="chat">
    <div class="header">Aurobinda</div>

    <div class="messages" id="messages">

        <div class="img-msg" id="imageContainer">
            <svg id="img" viewBox="0 0 100 100">
                <circle cx="50" cy="40" r="20" fill="#dfe6e9"/>
                <rect x="30" y="60" width="40" height="20" rx="10" fill="#dfe6e9"/>
                <circle cx="42" cy="38" r="2" fill="#636e72"/>
                <circle cx="58" cy="38" r="2" fill="#636e72"/>
                <path d="M42 48 Q50 52 58 48" stroke="#636e72" stroke-width="2" fill="none"/>
            </svg>

            <div class="instruction" id="instruction">Double tap the image</div>
        </div>

    </div>
</div>

<script>
let lastTap = 0;
let step = -1;
let finalMode = false;

const messages = [
    "I think there was a misunderstanding.",
    "I didn’t mean for things to go that way.",
    "Our friendship matters.",
    "Sorry about that."
];

const img = document.getElementById("img");
const chat = document.getElementById("messages");

// Add message
function addMessage(text, type = "sent") {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.insertBefore(div, document.getElementById("imageContainer"));
    chat.scrollTop = chat.scrollHeight;
}

// Heart
function createHeart(x, y) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";

    heart.style.left = x + "px";
    heart.style.top = y + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 2000);
}

// Happy face
function makeHappyFace() {
    img.innerHTML = `
        <circle cx="50" cy="40" r="20" fill="#ffeaa7"/>
        <rect x="30" y="60" width="40" height="20" rx="10" fill="#ffeaa7"/>
        <circle cx="42" cy="38" r="2" fill="#2d3436"/>
        <circle cx="58" cy="38" r="2" fill="#2d3436"/>
        <path d="M40 50 Q50 60 60 50" stroke="#2d3436" stroke-width="2" fill="none"/>
    `;
}

// Click logic
img.addEventListener("click", (e) => {

    // Final mode → single tap hearts
    if (finalMode) {
        createHeart(e.clientX, e.clientY);
        return;
    }

    let currentTime = new Date().getTime();
    let tapLength = currentTime - lastTap;

    img.classList.add("shake");
    setTimeout(() => img.classList.remove("shake"), 300);

    if (tapLength < 300 && tapLength > 0) {

        step++;

        if (step === 0) {
            addMessage("Hi Pretty...", "sent");

            setTimeout(() => {
                addMessage("?? 😠", "received");
            }, 1000);
        }
        else if (step <= messages.length) {
            addMessage(messages[step - 1], "sent");
        }
        else if (step === messages.length + 1) {
            // FINAL DOUBLE TAP → show acceptance
            addMessage("Sorry granted 🙂", "received");

            makeHappyFace();
            finalMode = true;
            document.getElementById("instruction").innerText = "Tap for hearts";
        }
    }

    lastTap = currentTime;
});
</script>

</body>
</html>
