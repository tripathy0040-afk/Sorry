<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Himanshu</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NWWMV87WVS"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NWWMV87WVS');
</script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: #e5ddd5;
}

.chat {
    width: 360px;
    height: 620px;
    background: #ece5dd;
    display: flex;
    flex-direction: column;
    border-radius: 15px;
    overflow: hidden;
}

.header {
    background: #075e54;
    color: white;
    padding: 15px;
    font-weight: bold;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* rows */
.row {
    display: flex;
    width: 100%;
    margin: 5px 0;
}

.left { justify-content: flex-start; }
.right { justify-content: flex-end; }

/* bubbles */
.msg {
    max-width: 70%;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 14px;
}

.sent { background: white; }
.received { background: #dcf8c6; }

/* IMAGE */
.img-msg {
    text-align: center;
    margin: 10px 0;
}

img {
    width: 170px;
    border-radius: 10px;
    cursor: pointer;
}

/* CHOICES ABOVE IMAGE */
#choices {
    display: none;
    text-align: center;
    padding: 10px;
}

#choices button {
    margin: 5px;
    padding: 8px 12px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-weight: bold;
}

#choices button:nth-child(1) { background: #00c853; color: white; }
#choices button:nth-child(2) { background: #bbb; }
#choices button:nth-child(3) { background: #ff7043; color: white; }

</style>
</head>

<body>

<div class="chat">
    <div class="header">Himanshu</div>

    <div class="messages" id="messages">

        <!-- ✅ BUTTONS FIRST (ABOVE IMAGE) -->
        <div id="choices">
            <button onclick="choose('forgive')">💛 It's okay</button>
            <button onclick="choose('time')">⏳ Need time</button>
            <button onclick="choose('honest')">💬 Be honest</button>
        </div>

        <!-- IMAGE -->
        <div class="img-msg" id="imageContainer">
            <img id="img" src="1.png">
            <div>Double tap the image</div>
        </div>

    </div>
</div>

<audio id="bgMusic" src="Music.mp3" loop></audio>

<script>
let step = 0;
let mode = "story";
let musicStarted = false;
let imgIndex = 1;

const chat = document.getElementById("messages");
const img = document.getElementById("img");
const music = document.getElementById("bgMusic");

const messages = [
    "Hi Pretty…",
    "I’ve been thinking about everything.",
    "I’m really sorry for what I said.",
    "I never wanted to hurt you.",
    "Our friendship matters lot to me.",
    "I just wanted to say that honestly."
];

function addMessage(text, side) {
    let row = document.createElement("div");
    row.className = "row " + side;

    let msg = document.createElement("div");
    msg.className = "msg " + (side === "left" ? "sent" : "received");
    msg.innerText = text;

    row.appendChild(msg);
    chat.insertBefore(row, document.getElementById("choices"));

    chat.scrollTop = chat.scrollHeight;
}

/* ✅ DOUBLE TAP EVENT */
let lastTap = 0;

img.addEventListener("click", () => {
    const now = new Date().getTime();
    const diff = now - lastTap;

    if (diff < 300) {
        handleDoubleTap();
    }

    lastTap = now;
});

function handleDoubleTap() {

    if (!musicStarted) {
        music.play();
        musicStarted = true;
    }

    /* 🔁 CHANGE IMAGE 1 → 8 LOOP */
    imgIndex++;
    if (imgIndex > 8) imgIndex = 1;
    img.src = imgIndex + ".png";

    if (mode !== "story") return;

    if (step < messages.length) {
        addMessage(messages[step], "left");

        if (step === 2) {
            setTimeout(() => addMessage("🙄", "right"), 800);
        }

        if (step === 4) {
            setTimeout(() => addMessage("I know you didn’t mean it.", "right"), 800);
        }
    }

    step++;

    if (step === messages.length) {
        document.getElementById("choices").style.display = "block";
        mode = "choice";

        gtag('event', 'choice_shown', {
            event_category: 'interaction'
        });
    }
}

/* 🎯 CHOICE HANDLING */
function choose(option) {

    document.getElementById("choices").style.display = "none";
    mode = "end";

    gtag('event', 'ending_selected', {
        event_category: 'interaction',
        event_label: option
    });

    if (option === "forgive") {
        addMessage("It’s okay… 🙂", "right");
        addMessage("Let’s move forward.", "right");
        addMessage("I forgive you 💛", "right");
    }

    else if (option === "time") {
        addMessage("I understand what you’re saying…", "right");
        addMessage("But I need a little time.", "right");
    }

    else if (option === "honest") {
        addMessage("I was hurt…", "right");
        addMessage("But I appreciate your honesty.", "right");
        addMessage("Let’s take things slowly.", "right");
    }
}
</script>

</body>
</html>
